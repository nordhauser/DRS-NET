# ═══════════════════════════════════════════════════════════════
# DUNGEON RUNNERS REBORN — SERVER CONFIGURATION
# ═══════════════════════════════════════════════════════════════
# All values are the ORIGINAL game defaults from GlobalKnobs.gc
# unless noted otherwise.
#
# Edit and restart server — no rebuild needed.
# Use @set/@get/@reload in game chat for live changes.
# Use @config to see all loaded values.
#
# STATUS KEY:
#   [WIRED]       = Server reads this value and uses it
#   [CLIENT-SIDE] = Client binary controls this, server can't change it
#   [NOT-IMPL]    = Feature not implemented yet on server
# ═══════════════════════════════════════════════════════════════

# ─── NETWORK [WIRED] ──────────────────────────────────────────
authIP = 127.0.0.1
authPort = 2110
gameIP = 127.0.0.1
gamePort = 2603
queuePort = 2606

# ─── SERVER [WIRED] ───────────────────────────────────────────
serverName = Dungeon Runners
maxPlayers = 50
startZone = tutorial
enableDebugLog = true
focusedDebugLog = true

# ─── LOGGING [WIRED] ──────────────────────────────────────────
logCategories = combat,zone,entity,skill

# ─── WELCOME / MOTD [WIRED] ───────────────────────────────────
welcomeMessage = Welcome to DungeonRunners Reborn!!!
motd = Server is running!!!!! Welcome Back Runners!!!!!

# ─── CHAT COLORS [WIRED] ──────────────────────────────────────
welcomeColor = #4B0082
motdColor = #FF0000
announceColor = #4B0082
announceEffect = glow

# ─── MOB BEHAVIOR [WIRED] ─────────────────────────────────────
defaultBehavior = dungeon_specific

# ─── MEMBERSHIP SYSTEM [WIRED via DLL] ────────────────────────
# Per-player flag in SQLite. Commands: @setfree @setmember @membership @members
# defaultMembership: new accounts start as "member" or "free"
#
# HOW XP WORKS:
#   1. Server sends gcExperienceMod + freePlayerXPMultiplier to DLL
#   2. DLL patches client binary with both values
#   3. Client calculates XP using patched values
#   4. DLL hooks client's addExperience and reports actual XP to server
#   5. Server uses client's reported XP as truth (no formula mismatch)
#   6. If DLL report doesn't arrive, server falls back to its own formula
#
# freePlayerPenaltyMultiplier: DLL patches client float at 0x00836890
# Affects: gold drops, item prices, quest gold, skill damage for free players
# Does NOT affect XP (XP uses FreePlayerExperienceModifier = 0.87 fixed)
# 0.6 = authentic (40% penalty), 1.0 = no penalty

defaultMembership = member
#defaultMembership = member
freePlayerXPMultiplier = 0.87

